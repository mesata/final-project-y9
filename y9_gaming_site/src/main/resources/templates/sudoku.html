<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y9 — Sudoku Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/homePage.css" />
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            background-image: url('../img/backgrounds/final.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .sudoku-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
            min-height: 85vh;
        }

        .game-panel {
            background: rgba(71, 44, 82, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px rgba(145, 60, 143, 0.25);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
        }

        .game-header h1 {
            font-family: 'Bitcount Grid Double Ink', monospace;
            color: #d07fd8;
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        .timer-display {
            font-family: monospace;
            font-size: 1.5rem;
            color: #e194d5;
            background: rgba(186, 43, 124, 0.2);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid rgba(163, 42, 107, 0.5);
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(9, 1fr);
            gap: 1px;
            background: rgba(163, 42, 107, 0.4);
            border: 3px solid #b327c9;
            margin: 0 auto 30px auto;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(179, 39, 201, 0.2);
        }

        .sudoku-cell {
            width: 100%;
            height: 100%;
            min-width: 0;
            background: rgba(71, 44, 82, 0.85);
            border: none;
            color: #ffffff;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            outline: none;
            box-sizing: border-box;
            padding: 0;
            transition: background 0.15s, box-shadow 0.15s;
        }

        .sudoku-cell:focus {
            background: #ffffff !important;
            color: rgba(186, 43, 124, 1) !important;
        }

        .sudoku-cell.highlight-number-match {
            background: rgba(186, 43, 124, 0.5) !important;
            box-shadow: inset 0 0 0 2px #e765e0 !important;
            color: #ffffff !important;
        }

        .sudoku-cell:nth-child(3n) { border-right: 2px solid #b327c9; }
        .sudoku-cell:nth-child(9n) { border-right: none; }

        .sudoku-cell:nth-child(n+19):nth-child(-n+27),
        .sudoku-cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid #b327c9;
        }

        .sudoku-cell.is-clue {
            background: rgba(30, 15, 36, 0.6);
            color: #cba8d8;
            cursor: default;
            caret-color: transparent;
        }

        .actions-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .y9-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease-in-out;
            outline: none;
        }

        .y9-btn:hover {
            background: #ffffff !important;
            color: rgba(186, 43, 124, 1) !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .y9-btn:active {
            transform: scale(0.98);
        }

        .y9-btn--alt {
            background: rgba(179, 39, 201, 0.1);
            border: 1px solid rgba(179, 39, 201, 0.3);
            color: #e194d5;
        }

        .y9-btn--alt:hover {
            background: rgba(179, 39, 201, 0.25) !important;
            color: #ffffff !important;
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar(active='home')}"></nav>

<main class="sudoku-container">
    <div class="game-panel">
        <div class="game-header">
            <h1 id="mode-title">SUDOKU</h1>
            <div class="timer-display" id="sudoku-timer">00:00</div>
        </div>

        <div id="sudoku-grid" class="sudoku-grid"></div>

        <div class="actions-row">
            <button class="y9-btn" onclick="submitSolutionCheck()">Verify Solution</button>
            <button class="y9-btn y9-btn--alt" onclick="generateChallengeLink()">Challenge Friend</button>
            <button class="y9-btn y9-btn--alt" onclick="loadSoloPracticeGame()">Infinite Mode</button>
            <button class="y9-btn y9-btn--alt" style="border-color: rgba(255, 107, 157, 0.4); color: #ff6b9d;" onclick="giveUpAndReveal()">Reveal Solution 🏳️</button>
        </div>
    </div>
</main>

<script src="/js/navbar.js"></script>
<script src="/js/sudoku.js"></script>
</body>
</html>
