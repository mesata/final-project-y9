<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y9 — Sudoku Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/homePage.css" />
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            background-image: url('../img/backgrounds/final.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .sudoku-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 40px 20px;
            box-sizing: border-box;
            min-height: 85vh;
        }

        .game-panel, .sudoku-controls-card {
            background: rgba(71, 44, 82, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px rgba(145, 60, 143, 0.25);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        .game-panel {
            text-align: center;
        }

        .game-header h1 {
            font-family: 'Bitcount Grid Double Ink', monospace;
            color: #d07fd8;
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        .timer-display {
            font-family: monospace;
            font-size: 1.5rem;
            color: #e194d5;
            background: rgba(186, 43, 124, 0.2);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid rgba(163, 42, 107, 0.5);
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(9, 1fr);
            gap: 1px;
            background: rgba(163, 42, 107, 0.4);
            border: 3px solid #b327c9;
            margin: 0 auto 30px auto;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(179, 39, 201, 0.2);
        }

        .sudoku-cell {
            width: 100%;
            height: 100%;
            min-width: 0;
            background: rgba(71, 44, 82, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: #ffffff;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            outline: none;
            box-sizing: border-box;
            padding: 0;
            transition: background 0.15s, box-shadow 0.15s, color 0.15s, border-color 0.15s;
        }

        .sudoku-cell:focus, .sudoku-cell.focused-cell {
            background: #ffffff !important;
            color: rgba(186, 43, 124, 1) !important;
            border-color: #e765e0 !important;
            box-shadow: 0 0 8px rgba(231, 101, 224, 0.6);
        }

        .sudoku-cell.highlight-number-match {
            background: rgba(186, 43, 124, 0.5) !important;
            box-shadow: inset 0 0 0 2px #e765e0 !important;
            color: #ffffff !important;
        }

        .sudoku-cell:nth-child(3n) { border-right: 2px solid #b327c9; }
        .sudoku-cell:nth-child(9n) { border-right: none; }

        .sudoku-cell:nth-child(n+19):nth-child(-n+27),
        .sudoku-cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid #b327c9;
        }

        .sudoku-cell.is-clue {
            background: rgba(30, 15, 36, 0.6);
            color: #cba8d8;
            cursor: default;
            caret-color: transparent;
        }

        /* --- Auto-Check Color States --- */
        .sudoku-cell.check-error {
            background-color: rgba(255, 107, 157, 0.25) !important;
            color: #ff6b9d !important;
            border: 1px solid #ff6b9d !important;
        }

        .sudoku-cell.check-correct {
            background-color: rgba(78, 205, 196, 0.25) !important;
            color: #4ecdc4 !important;
            border: 1px solid #4ecdc4 !important;
        }

        .sudoku-cell.is-hint-provided {
            color: #4ecdc4 !important;
            font-style: italic;
        }

        .actions-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .y9-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease-in-out;
            outline: none;
        }

        .y9-btn:hover {
            background: #ffffff !important;
            color: rgba(186, 43, 124, 1) !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .y9-btn:active {
            transform: scale(0.98);
        }

        .y9-btn--alt {
            background: rgba(179, 39, 201, 0.1);
            border: 1px solid rgba(179, 39, 201, 0.3);
            color: #e194d5;
        }

        .y9-btn--alt:hover {
            background: rgba(179, 39, 201, 0.25) !important;
            color: #ffffff !important;
        }

        /* --- Assistant Card Styles --- */
        .sudoku-controls-card h3 {
            margin: 0 0 16px 0;
            font-size: 1.1rem;
            color: #d07fd8;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 8px;
        }

        .controls-action-row {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .hint-btn {
            background: rgba(186, 43, 124, 0.25);
            border: 1px solid rgba(186, 43, 124, 0.6);
            color: #e194d5;
        }

        .hint-btn:hover:not(.button-exhausted) {
            background: rgba(186, 43, 124, 0.5) !important;
            color: #fff !important;
        }

        .button-exhausted {
            background: rgba(0, 0, 0, 0.3) !important;
            border-color: rgba(255, 255, 255, 0.05) !important;
            color: #666 !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .autocheck-toggle-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-size: 0.95rem;
            color: #cba8d8;
            gap: 12px;
        }

        .autocheck-toggle-label input {
            display: none;
        }

        .custom-toggle-slider {
            position: relative;
            width: 42px;
            height: 22px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .custom-toggle-slider::before {
            content: "";
            position: absolute;
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        input:checked + .custom-toggle-slider {
            background-color: rgba(179, 39, 201, 0.5);
            border-color: #b327c9;
        }

        input:checked + .custom-toggle-slider::before {
            transform: translateX(20px);
            background-color: #ffffff;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .custom-toast {
            background: rgba(30, 15, 36, 0.95);
            backdrop-filter: blur(8px);
            border-left: 4px solid #b327c9;
            color: #fff;
            padding: 14px 24px;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            font-size: 0.95rem;
            font-weight: 600;
            min-width: 250px;
            max-width: 350px;
            animation: slideIn 0.3s forwards, fadeOut 0.3s linear 4.5s forwards;
        }

        .custom-toast.toast-error { border-left-color: #ff6b9d; }
        .custom-toast.toast-success { border-left-color: #4ecdc4; }
        .custom-toast.toast-warn { border-left-color: #ffbe0b; }

        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            to { transform: translateY(-10px); opacity: 0; }
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 10, 25, 0.8);
            backdrop-filter: blur(6px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .modal-overlay.modal-open { opacity: 1; pointer-events: auto; }

        .difficulty-card {
            background: rgba(45, 25, 55, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            width: 90%; max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .difficulty-card h2 {
            font-family: 'Bitcount Grid Double Ink', monospace;
            color: #d07fd8; margin-top: 0; margin-bottom: 20px;
        }
        .difficulty-grid {
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar(active='home')}"></nav>

<div id="toast-container" class="toast-container"></div>

<main class="sudoku-container">
    <div class="game-panel">
        <div class="game-header">
            <div class="game-header">
                <h1 id="mode-title">SUDOKU</h1>
                <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 25px;">
                    <div class="timer-display" id="sudoku-timer">00:00</div>
                    <div class="timer-display" id="mistakes-counter" style="background: rgba(255, 107, 157, 0.15); border-color: rgba(255, 107, 157, 0.4); color: #ff6b9d;">
                        ❤️ ❤️ ❤️
                    </div>
                </div>
            </div>

        </div>

        <div id="sudoku-grid" class="sudoku-grid"></div>

        <div class="actions-row">
            <button class="y9-btn" onclick="submitSolutionCheck()">Verify Solution</button>
            <button class="y9-btn y9-btn--alt" onclick="generateChallengeLink()">Challenge Friend</button>
            <button class="y9-btn y9-btn--alt" onclick="openDifficultyModal()">Infinite Mode</button>
            <button class="y9-btn y9-btn--alt" style="border-color: rgba(255, 107, 157, 0.4); color: #ff6b9d;" onclick="giveUpAndReveal()">Reveal Solution 🏳️</button>
        </div>
    </div>

    <div class="dashboard-card sudoku-controls-card">
        <h3>Game Assistant</h3>
        <div class="controls-action-row">
            <button id="hint-btn" class="y9-btn hint-btn" onclick="triggerBoardCellHint()">
                💡 Get Hint (3/3 left)
            </button>

            <label class="autocheck-toggle-label">
                <input type="checkbox" id="auto-check-toggle">
                <span class="custom-toggle-slider"></span>
                Auto Check
            </label>
        </div>
    </div>
</main>

<div id="difficulty-modal" class="modal-overlay" onclick="closeDifficultyModal()">
    <div class="difficulty-card" onclick="event.stopPropagation()">
        <h2>Select Difficulty</h2>
        <div class="difficulty-grid">
            <button class="y9-btn" onclick="selectDifficulty('EASY')">Easy </button>
            <button class="y9-btn" onclick="selectDifficulty('MEDIUM')">Medium </button>
            <button class="y9-btn" onclick="selectDifficulty('HARD')">Hard </button>
        </div>
        <button class="y9-btn y9-btn--alt" style="margin-top: 10px;" onclick="closeDifficultyModal()">Cancel</button>
    </div>
</div>

<script src="/js/navbar.js"></script>
<script src="/js/sudoku.js"></script>
</body>
</html>
