<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar(active)" class="navbar">
    <a class="navbar__brand" href="/home">Y9</a>
    <ul class="navbar__links">
        <li><a href="/home" th:classappend="${active == 'home'} ? 'active'">Home</a> </li>
        <li><a href="/quizzes" th:classappend="${active == 'quizzes'} ? 'active'">Quizzes</a> </li>
