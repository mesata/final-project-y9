<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y9 — Hall of Fame</title>

<!--    <link rel="preconnect" href="https://fonts.googleapis.com">-->
<!--    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>-->
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink&display=swap" rel="stylesheet">

<!--    <link rel="stylesheet" href="/css/homePage.css">-->
    <link rel="stylesheet" href="/css/leaderboard.css">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar(active='leaderboard')}"></nav>
<script src="/js/navbar.js"></script>



<div class="leaderboard-container">
    <h1 class="leaderboard-main-title">🏆 LEADERBOARD 🏆</h1>

    <div class="controls-row">
        <div class="select-wrapper">
            <select id="gameSelect" class="custom-game-select" onchange="changeGame()">
                <option value="Joker"> Joker</option>
                <option value="Sudoku"> Sudoku</option>
                <option value="Wordle"> Wordle</option>
            </select>
        </div>

        <div class="filter-selector">
            <button class="filter-btn active" onclick="selectFilter('alltime', this)">All Time</button>
            <button class="filter-btn" onclick="selectFilter('today', this)">Last 24h</button>
        </div>
    </div>

    <div id="loading" class="loading" style="display: none;">Syncing secure database score blocks...</div>
    <div id="empty-state" class="empty-state" style="display: none;">No records found for this criteria.</div>

    <div class="table-neon-glow-wrapper">
        <table id="leaderboard-table" class="leaderboard-table">
            <thead>
            <tr>
                <th style="width: 15%;"># RANK</th>
                <th style="width: 45%;">👤 USERNAME</th>
                <th style="width: 20%;">🎯 SCORE</th>
                <th style="width: 20%;">📅 DATE PLAYED</th>
            </tr>
            </thead>
            <tbody id="leaderboard-body">
            </tbody>
        </table>
    </div>
</div>

<script src="/js/leaderboard.js"></script>
</body>
</html>
