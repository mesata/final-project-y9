<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard</title>
    <link rel="stylesheet" href="/css/leaderboard.css">
</head>
<body>

<div class="leaderboard-container">
    <h1>🏆 Leaderboard</h1>

    <div class="game-selector">
        <button class="game-btn active" data-game="wordle" onclick="selectGame('wordle', this)">Wordle</button>
        <button class="game-btn" data-game="sudoku" onclick="selectGame('sudoku', this)">Sudoku</button>
        <button class="game-btn" data-game="joker" onclick="selectGame('joker', this)">Joker</button>
    </div>

    <div id="loading" class="loading" style="display:none">Loading...</div>
    <div id="empty-state" class="empty-state" style="display:none">
        No scores yet for this game. Be the first to play!
    </div>

    <table class="leaderboard-table" id="leaderboard-table">
        <thead>
        <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Score</th>
            <th>Date</th>
        </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
    </table>
</div>

<script src="/js/leaderboard.js"></script>
</body>
</html>
