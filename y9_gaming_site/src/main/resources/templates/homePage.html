<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Y9 — Home</title>

    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/homePage.css" />
</head>
<body>

<nav class="navbar">
    <a class="navbar__brand" href="/home">Y9</a>

    <ul class="navbar__links">
        <li><a href="/home" class="active">Home</a></li>
        <li><a href="/quizzes">Quizzes</a></li>
        <li><a href="/leaderboard">Leaderboard</a></li>
        <li><a href="/chat">Chat</a></li>
        <li id="adminLink" style="display:none;">
            <a th:href="@{/admin/dashboard}">Admin Panel</a>
        </li>

    </ul>

    <div class="navbar__user">
        <img id="nav-avatar" class="navbar__avatar" src="/img/avatars/default.png" alt="avatar" />
        <span id="nav-username" class="navbar__username">...</span>
        <button onclick="logout()" class="navbar__logout">Log out</button>    </div>
</nav>

<main class="page">

    <section class="hero">
        <p class="hero__label">Total Players</p>
        <h1 class="hero__number" id="total-users">—</h1>
        <p class="hero__sub">and counting</p>
    </section>

    <div class="games-container">
        <h1 class="hub-title">⚡ Available Games ⚡</h1>
        <div id="gameGrid" class="game-grid">
            <p>Scanning game database blocks...</p>
        </div>
    </div>

    <div class="grid">

        <section class="card" id="leaderboard-card">
            <h2 class="card__title">🏆 Top Players (Last 24h)</h2>
            <ol class="leaderboard" id="top-players">
                <li class="leaderboard__skeleton"></li>
                <li class="leaderboard__skeleton"></li>
                <li class="leaderboard__skeleton"></li>
            </ol>

            <div style="text-align: center; margin-top: 20px;">
                <a href="/leaderboard" class="play-btn" style="text-decoration: none; display: inline-block; width: auto; padding: 8px 25px;">
                    View Full Leaderboard →
                </a>
            </div>
        </section>

        <section class="card" id="achievements-card">
            <h2 class="card__title">⭐ Recent Achievements</h2>
            <ul class="achievements" id="recent-achievements">
                <li class="achievements__skeleton"></li>
                <li class="achievements__skeleton"></li>
                <li class="achievements__skeleton"></li>
            </ul>
        </section>

    </div>
</main>

<div id="gameTheaterModal" class="theater-overlay hidden">
    <div class="theater-header">
        <h2 id="theaterGameTitle" class="theater-title">Game Room</h2>
        <button class="close-theater-btn" onclick="closeGameTheater()">✕ Exit Game</button>
    </div>
    <div class="theater-body">
        <iframe id="gameIframe" src="" allowfullscreen></iframe>
    </div>
</div>

<script src="/js/homePage.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        fetchAndRenderGames();
    });

    async function fetchAndRenderGames() {
        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/games', {
                method: 'GET',
                headers: {
                    'Authorization': token ? `Bearer ${token}` : '',
                    'Content-Type': 'application/json'
                }
            });

            if (!res.ok) throw new Error();

            const games = await res.json();
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';

                const isSource = game.gameType === 'OPENSOURCE';
                const badgeClass = isSource ? 'badge-source' : 'badge-home';
                const badgeText = isSource ? 'Web Arcade' : 'Custom Multiplayer';

                card.innerHTML = `
                    <div>
                        <img class="game-icon" src="${game.iconUrl}" alt="${game.title}" onerror="this.src='/img/games/default.png'">
                        <div class="game-title">${game.title}</div>
                        <span class="game-badge ${badgeClass}">${badgeText}</span>
                        <div class="game-desc">${game.description || ''}</div>
                    </div>
                    <button class="play-btn" onclick="handlePlayGame(${game.id}, '${game.gameType}', '${game.sourceUrl || ''}', '${game.title.replace(/'/g, "\\'")}')">
                        Launch Game
                    </button>
                `;
                grid.appendChild(card);
            });
        } catch (err) {
            document.getElementById('gameGrid').innerHTML = `<p style="color:#ff5599;text-align:center;">Failed to sync with game database backend.</p>`;
        }
    }

    function handlePlayGame(id, type, sourceUrl, title) {
        if (type === 'OPENSOURCE') {
            const modal = document.getElementById('gameTheaterModal');
            const iframe = document.getElementById('gameIframe');
            const titleHeader = document.getElementById('theaterGameTitle');

            titleHeader.textContent = title.toUpperCase();
            iframe.src = sourceUrl;
            modal.classList.remove('hidden');
        } else {
            alert("Initializing Custom Game Session Lobby. Checking WebSocket pipelines...");
        }
    }

    function closeGameTheater() {
        const modal = document.getElementById('gameTheaterModal');
        const iframe = document.getElementById('gameIframe');
        modal.classList.add('hidden');
        iframe.src = "";
    }
    async function logout() {
        await fetch("/api/users/logout", { method: "POST" });
        localStorage.removeItem("token");
        localStorage.removeItem("role");
        window.location.href = "/login";
    }
</script>
</body>
</html>
