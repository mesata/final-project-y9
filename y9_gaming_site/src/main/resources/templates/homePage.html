<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Y9 — Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/homePage.css" />
</head>
<body>

    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Y9 — Home</title>
        <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/navbar.css}">
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }

            /*body {*/
            /*    font-family: 'Segoe UI', sans-serif;*/
            /*    color: #fff;*/
            /*    background: linear-gradient(135deg, #523b5c 0%, #523b5c 10%, #6a4b6a 70%, #5a2c5e 100%);*/
            /*    min-height: 100vh;*/
            /*}*/
            body {
                font-family: 'Segoe UI', sans-serif;
                color: #fff;
                background-image: url('/img/backgrounds/final.png');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
                min-height: 100vh;
            }

            .hero {
                text-align: center;
                padding: 55px 20px 35px;
            }
            .hero__label {
                font-size: 12px;
                letter-spacing: 4px;
                text-transform: uppercase;
                color: #cba8d8;
                margin-bottom: 10px;
            }
            .hero__number {
                font-family: 'Bitcount Grid Double Ink', monospace;
                font-size: 80px;
                color: #e194d5;
                line-height: 1;
            }
            .hero__sub {
                font-size: 12px;
                color: #aaa;
                margin-top: 10px;
                letter-spacing: 3px;
                text-transform: uppercase;
            }

            .games-container {
                padding: 30px 40px 10px;
                max-width: 1200px;
                margin: 0 auto;
            }
            .hub-title {
                font-family: 'Bitcount Grid Double Ink', monospace;
                color: #b327c9;
                text-align: center;
                margin-bottom: 28px;
                letter-spacing: 3px;
                text-transform: uppercase;
                font-size: 22px;
            }
            .game-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 22px;
            }
            .game-card {
                background: rgba(71, 44, 82, 0.4);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 12px;
                padding: 22px;
                text-align: center;
                color: white;
                transition: all 0.3s ease;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                backdrop-filter: blur(8px);
            }
            .game-card:hover {
                transform: translateY(-5px);
                border-color: #e765e0;
                box-shadow: 0 10px 25px rgba(145, 60, 143, 0.4);
            }
            .game-icon {
                width: 80px;
                height: 80px;
                object-fit: cover;
                border-radius: 12px;
                margin: 0 auto 15px auto;
                border: 2px solid rgba(255, 255, 255, 0.2);
            }
            .game-title {
                font-size: 18px;
                margin-bottom: 8px;
                font-weight: 700;
            }
            .game-desc {
                font-size: 13px;
                color: #ccc;
                margin-bottom: 18px;
                line-height: 1.5;
            }
            .game-badge {
                display: inline-block;
                font-size: 10px;
                padding: 4px 9px;
                border-radius: 4px;
                text-transform: uppercase;
                font-weight: bold;
                margin-bottom: 14px;
                letter-spacing: 0.5px;
            }
            .badge-source { background-color: #00f0ff; color: #0f0f1a; }
            .badge-home   { background-color: #ff007f; color: #fff; }
            .play-btn {
                width: 100%;
                padding: 11px;
                background-color: #9a4eab;
                border: none;
                color: white;
                font-weight: bold;
                border-radius: 6px;
                cursor: pointer;
                font-size: 13px;
                transition: background-color 0.2s;
            }
            .play-btn:hover { background-color: #e194d5; color: #0f0f1a; }

            .grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 22px;
                max-width: 1200px;
                margin: 28px auto 50px;
                padding: 0 40px;
            }
            .card {
                background: rgba(71, 44, 82, 0.6);
                backdrop-filter: blur(8px);
                border-radius: 16px;
                padding: 28px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                box-shadow: 0 10px 40px rgba(145, 60, 143, 0.25);
            }
            .card__title {
                font-family: 'Bitcount Grid Double Ink', monospace;
                color: #d07fd8;
                font-size: 18px;
                margin-bottom: 20px;
                letter-spacing: 1px;
            }

            .leaderboard { list-style: none; }
            .leaderboard li {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 11px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.07);
                font-size: 14px;
            }
            .leaderboard li:last-child { border-bottom: none; }
            .leaderboard__rank {
                font-family: 'Bitcount Grid Double Ink', monospace;
                font-size: 22px;
                color: #b327c9;
                min-width: 28px;
            }
            .leaderboard__name { flex: 1; color: #e8e8e8; }
            .leaderboard__score { color: #e194d5; font-weight: bold; font-size: 13px; }
            .leaderboard__skeleton {
                height: 40px;
                background: rgba(179, 39, 201, 0.1);
                border-radius: 6px;
                margin-bottom: 8px;
                animation: pulse 1.5s infinite;
            }

            .achievements { list-style: none; }
            .achievements li {
                display: flex;
                align-items: flex-start;
                gap: 14px;
                padding: 11px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            }
            .achievements li:last-child { border-bottom: none; }
            .achievements__icon { font-size: 22px; min-width: 28px; text-align: center; }
            .achievements__name { color: #e8e8e8; font-weight: 600; font-size: 13px; margin-bottom: 3px; }
            .achievements__who  { font-size: 11px; color: #aaa; }
            .achievements__skeleton {
                height: 48px;
                background: rgba(179, 39, 201, 0.1);
                border-radius: 6px;
                margin-bottom: 8px;
                animation: pulse 1.5s infinite;
            }

            @keyframes pulse {
                0%, 100% { opacity: 0.5; }
                50%       { opacity: 1; }
            }

            .theater-overlay {
                position: fixed;
                top: 0; left: 0;
                width: 100vw; height: 100vh;
                background-color: #0a0a12;
                z-index: 9999;
                display: flex;
                flex-direction: column;
            }
            .theater-header {
                background-color: rgba(71, 44, 82, 0.9);
                border-bottom: 2px solid #b327c9;
                padding: 15px 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .theater-title {
                font-family: 'Bitcount Grid Double Ink', monospace;
                color: #e194d5;
                letter-spacing: 2px;
                font-size: 22px;
                margin: 0;
            }
            .close-theater-btn {
                padding: 8px 18px;
                background-color: #ff007f;
                color: white;
                border: none;
                border-radius: 6px;
                font-weight: bold;
                cursor: pointer;
                font-size: 14px;
                transition: background 0.2s;
            }
            .close-theater-btn:hover { background-color: #ff5599; }
            .theater-body {
                flex-grow: 1;
                width: 100%;
                height: calc(100vh - 65px);
                background-color: #000;
            }
            .theater-body iframe { width: 100%; height: 100%; border: none; }

            .hidden { display: none !important; }

            @media (max-width: 768px) {
                .grid { grid-template-columns: 1fr; padding: 0 20px; }
                .games-container { padding: 20px 20px 10px; }
                .hero__number { font-size: 56px; }
                .navbar__links { display: none; }
            }
        </style>
    </head>
    <body>

    <nav th:replace="~{fragments/navbar :: navbar(active='home')}"></nav>


<main class="page layout-split">


    <aside class="sidebar-categories">
        <h3 class="sidebar-title">Categories</h3>
        <ul class="category-menu">
            <li><button class="cat-btn active" onclick="filterCategory('ALL')">🎮 All Games</button></li>
            <li><button class="cat-btn" onclick="filterCategory('ACTION')">💥 Action</button></li>
            <li><button class="cat-btn" onclick="filterCategory('ADVENTURE')">🗺️ Adventure</button></li>
            <li><button class="cat-btn" onclick="filterCategory('ARCADE')">🕹️ Arcade</button></li>
            <li><button class="cat-btn" onclick="filterCategory('BOARD_PUZZLE')">🧩 Puzzle</button></li>
            <li><button class="cat-btn" onclick="filterCategory('SHOOTER')">🔫 Shooter</button></li>
            <li><button class="cat-btn" onclick="filterCategory('STRATEGY')">🧠 Strategy</button></li>
            <li><button class="cat-btn" onclick="filterCategory('SPORTS')">⚽ Sports</button></li>
            <li><button class="cat-btn" onclick="filterCategory('MULTIPLAYER')">👥 Multiplayer</button></li>
        </ul>
    </aside>


    <div class="main-content-flow">


        <section class="hero">
            <p class="hero__label">Total Players</p>
            <h1 class="hero__number" id="total-users">—</h1>
            <p class="hero__sub">and counting</p>
        </section>


        <div class="games-container">
            <h2 class="hub-title" id="current-category-title">⚡ Available Games ⚡</h2>
            <div id="gameGrid" class="y8-game-grid">
                <p>Scanning game database blocks...</p>
            </div>
        </div>


        <div class="grid">
            <section class="card" id="leaderboard-card">
                <h2 class="card__title">🏆 Top Players (Last 24h)</h2>
                <ol class="leaderboard" id="top-players">
                    <li class="leaderboard__skeleton"></li>
                    <li class="leaderboard__skeleton"></li>
                    <li class="leaderboard__skeleton"></li>
                </ol>
                <div style="text-align: center; margin-top: 20px;">
                    <a href="/leaderboard" class="play-btn" style="text-decoration: none; display: inline-block; width: auto; padding: 8px 25px;">
                        View Full Leaderboard →
                    </a>
                </div>
            </section>


            <section class="card" id="achievements-card">
                <h2 class="card__title">⭐ Recent Achievements</h2>
                <ul class="achievements" id="recent-achievements">
                    <li class="achievements__skeleton"></li>
                    <li class="achievements__skeleton"></li>
                    <li class="achievements__skeleton"></li>
                </ul>
            </section>
        </div>


    </div>
</main>


<div id="gameTheaterModal" class="theater-overlay hidden">
    <div class="theater-header">
        <h2 id="theaterGameTitle" class="theater-title">Game Room</h2>
        <button class="close-theater-btn" onclick="window.closeGameTheater()">✕ Exit Game</button>    </div>
    <div class="theater-body">
        <iframe id="gameIframe" src="" allowfullscreen></iframe>
    </div>
</div>

<script src="/js/navbar.js"></script>
<script src="/js/homePage.js"></script>

<script src="/js/homePage.js?v=9999"></script>
<script>
    window.cachedGamesList = [];

    document.addEventListener("DOMContentLoaded", () => {
        fetchAndRenderRemoteGames();
    });

    async function fetchAndRenderRemoteGames() {
        try {
            const res = await fetch('https://raw.githubusercontent.com/InterstellarNetwork/Interstellar/main/static/assets/json/g.min.json');
            if (!res.ok) throw new Error("Network response was not ok");

            const remoteGames = await res.json();

            window.cachedGamesList = remoteGames
                .filter(game => game && game.name && !game.name.startsWith('!') && !['Steam', 'Amazon Luna', 'Newgrounds'].includes(game.name))
                .map((game, index) => {
                    const name = String(game.name).toLowerCase();
                    const tagString = game.categories && Array.isArray(game.categories)
                        ? game.categories.map(c => String(c).toLowerCase()).join(" ")
                        : "";

                    let matchedCategory = "ARCADE";

                    if (name.includes("fireboy") || name.includes("watergirl") || name.includes("2 player") || name.includes("2-player") || tagString.includes("multiplayer") || tagString.includes("2p")) {
                        matchedCategory = "MULTIPLAYER";
                    }
                    else if (name.includes("moto") || name.includes("bowl") || name.includes("race") || name.includes("car") || name.includes("drive") || name.includes("drift") || tagString.includes("sport")) {
                        matchedCategory = "SPORTS";
                    }
                    else if (name.includes("fps") || name.includes("lol") || name.includes("shoot") || name.includes("gun") || name.includes("sniper") || tagString.includes("shooter")) {
                        matchedCategory = "SHOOTER";
                    }
                    else if (name.includes("puzzle") || name.includes("chess") || name.includes("logic") || name.includes("block") || name.includes("match") || tagString.includes("puzzle")) {
                        matchedCategory = "BOARD_PUZZLE";
                    }
                    else if (name.includes("strategy") || name.includes("defense") || name.includes("clash") || name.includes("tower") || tagString.includes("strat")) {
                        matchedCategory = "STRATEGY";
                    }
                    else if (name.includes("adventure") || name.includes("rpg") || name.includes("world") || name.includes("quest") || tagString.includes("adv")) {
                        matchedCategory = "ADVENTURE";
                    }
                    else if (tagString.includes("action") || name.includes("fight") || name.includes("combat") || name.includes("smash")) {
                        matchedCategory = "ACTION";
                    }

                    let finalIcon = game.image || game.img || game.logo || '';
                    if (!finalIcon) {
                        finalIcon = '/img/games/default.png';
                    } else if (finalIcon.startsWith('/')) {
                        finalIcon = `https://raw.githubusercontent.com/InterstellarNetwork/Interstellar/main/static${finalIcon}`;
                    }

                    return {
                        id: index,
                        title: game.name || 'Unknown Web Game',
                        category: matchedCategory,
                        sourceUrl: game.link || '',
                        iconUrl: finalIcon,
                        gameType: 'OPENSOURCE'
                    };
                });

            renderGrid(window.cachedGamesList);

        } catch (err) {
            console.error("Registry load error details:", err);
            document.getElementById('gameGrid').innerHTML = `<p style="color:#ff5599;text-align:center;">Failed to live-stream games from remote network registry.</p>`;
        }
    }

    function renderGrid(games) {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = '';


        if (games.length === 0) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#888;">No games found in this category.</p>';
            return;
        }


        //marto isini minda romlebsac aqvt icon tore shavebi afuchebs
        const gamesWithIcons = games.filter(game => {
            return game.iconUrl &&
                game.iconUrl.trim() !== '' &&
                game.iconUrl !== 'null' &&
                game.iconUrl !== 'undefined';
        });

        gamesWithIcons.forEach(game => {
            const item = document.createElement('div');
            item.className = 'y8-game-box';
            item.onclick = () => window.handlePlayGame(game.id, game.gameType, game.sourceUrl, game.title);

            item.innerHTML = `
       <div class="y8-thumbnail-wrapper">
           <img class="y8-icon"
                src="${game.iconUrl}"
                alt="${game.title}"
                loading="lazy"
                onerror="this.onerror=null; this.src='/img/games/default.png';">
       </div>
       <div class="y8-title-label">${game.title}</div>
   `;
            grid.appendChild(item);
        });
    }


    function filterCategory(categoryKey) {
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(`'${categoryKey}'`)) {
                btn.classList.add('active');
            }
        });
        const titleElement = document.getElementById('current-category-title');
        if (categoryKey === 'ALL') {
            if (titleElement) titleElement.textContent = "⚡ Available Games ⚡";
            renderGrid(window.cachedGamesList);
        } else {
            let displayTitle = categoryKey;
            if (categoryKey === 'BOARD_PUZZLE') displayTitle = 'PUZZLE';
            if (titleElement) titleElement.textContent = `🕹️ ${displayTitle} Games`;
            const filtered = window.cachedGamesList.filter(g => g.category === categoryKey);
            renderGrid(filtered);
        }
    }


    async function logout() {
        await fetch("/api/users/logout", { method: "POST" });
        localStorage.removeItem("token");
        localStorage.removeItem("role");
        window.location.href = "/login";
    }


    async function redirectToMyProfile() {
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = "/login";
            return;
        }
        try {
            const res = await fetch("/api/users/me", {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                }
            });
            if (res.ok) {
                const user = await res.json();
                window.location.href = `/profile/${user.id}`;
            } else {
                window.location.href = "/login";
            }
        } catch (err) {
            console.error("Failed identity check:", err);
            window.location.href = "/login";
        }
    }
</script>
</body>
</html>
