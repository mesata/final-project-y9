<script src="/js/homePage.js?v=9999"></script>
<script>
    window.cachedGamesList = [];

    document.addEventListener("DOMContentLoaded", () => {
        fetchAndRenderRemoteGames();
    });

    async function fetchAndRenderRemoteGames() {
        try {
            const res = await fetch('https://raw.githubusercontent.com/InterstellarNetwork/Interstellar/main/static/assets/json/g.min.json');
            if (!res.ok) throw new Error("Network response was not ok");

            const remoteGames = await res.json();

            window.cachedGamesList = remoteGames
                .filter(game => game && game.name && !game.name.startsWith('!') && !['Steam', 'Amazon Luna', 'Newgrounds'].includes(game.name))
                .map((game, index) => {
                    const name = String(game.name).toLowerCase();
                    const tagString = game.categories && Array.isArray(game.categories)
                        ? game.categories.map(c => String(c).toLowerCase()).join(" ")
                        : "";

                    let matchedCategory = "ARCADE";

                    if (name.includes("fireboy") || name.includes("watergirl") || name.includes("2 player") || name.includes("2-player") || tagString.includes("multiplayer") || tagString.includes("2p")) {
                        matchedCategory = "MULTIPLAYER";
                    }
                    else if (name.includes("moto") || name.includes("bowl") || name.includes("race") || name.includes("car") || name.includes("drive") || name.includes("drift") || tagString.includes("sport")) {
                        matchedCategory = "SPORTS";
                    }
                    else if (name.includes("fps") || name.includes("lol") || name.includes("shoot") || name.includes("gun") || name.includes("sniper") || tagString.includes("shooter")) {
                        matchedCategory = "SHOOTER";
                    }
                    else if (name.includes("puzzle") || name.includes("chess") || name.includes("logic") || name.includes("block") || name.includes("match") || tagString.includes("puzzle")) {
                        matchedCategory = "BOARD_PUZZLE";
                    }
                    else if (name.includes("strategy") || name.includes("defense") || name.includes("clash") || name.includes("tower") || tagString.includes("strat")) {
                        matchedCategory = "STRATEGY";
                    }
                    else if (name.includes("adventure") || name.includes("rpg") || name.includes("world") || name.includes("quest") || tagString.includes("adv")) {
                        matchedCategory = "ADVENTURE";
                    }
                    else if (tagString.includes("action") || name.includes("fight") || name.includes("combat") || name.includes("smash")) {
                        matchedCategory = "ACTION";
                    }

                    let finalIcon = game.image || game.img || game.logo || '';
                    if (!finalIcon) {
                        finalIcon = '/img/games/default.png';
                    } else if (finalIcon.startsWith('/')) {
                        finalIcon = `https://raw.githubusercontent.com/InterstellarNetwork/Interstellar/main/static${finalIcon}`;
                    }

                    return {
                        id: index,
                        title: game.name || 'Unknown Web Game',
                        category: matchedCategory,
                        sourceUrl: game.link || '',
                        iconUrl: finalIcon,
                        gameType: 'OPENSOURCE'
                    };
                });

            renderGrid(window.cachedGamesList);

        } catch (err) {
            console.error("Registry load error details:", err);
            document.getElementById('gameGrid').innerHTML = `<p style="color:#ff5599;text-align:center;">Failed to live-stream games from remote network registry.</p>`;
        }
    }

    function renderGrid(games) {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = '';


        if (games.length === 0) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#888;">No games found in this category.</p>';
            return;
        }


        //marto isini minda romlebsac aqvt icon tore shavebi afuchebs
        const gamesWithIcons = games.filter(game => {
            return game.iconUrl &&
                game.iconUrl.trim() !== '' &&
                game.iconUrl !== 'null' &&
                game.iconUrl !== 'undefined';
        });

        gamesWithIcons.forEach(game => {
            const item = document.createElement('div');
            item.className = 'y8-game-box';
            item.onclick = () => window.handlePlayGame(game.id, game.gameType, game.sourceUrl, game.title);

            item.innerHTML = `
       <div class="y8-thumbnail-wrapper">
           <img class="y8-icon"
                src="${game.iconUrl}"
                alt="${game.title}"
                loading="lazy"
                onerror="this.onerror=null; this.src='/img/games/default.png';">
       </div>
       <div class="y8-title-label">${game.title}</div>
   `;
            grid.appendChild(item);
        });
    }


    function filterCategory(categoryKey) {
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(`'${categoryKey}'`)) {
                btn.classList.add('active');
            }
        });
        const titleElement = document.getElementById('current-category-title');
        if (categoryKey === 'ALL') {
            if (titleElement) titleElement.textContent = "⚡ Available Games ⚡";
            renderGrid(window.cachedGamesList);
        } else {
            let displayTitle = categoryKey;
            if (categoryKey === 'BOARD_PUZZLE') displayTitle = 'PUZZLE';
            if (titleElement) titleElement.textContent = `🕹️ ${displayTitle} Games`;
            const filtered = window.cachedGamesList.filter(g => g.category === categoryKey);
            renderGrid(filtered);
        }
    }


    async function logout() {
        await fetch("/api/users/logout", { method: "POST" });
        localStorage.removeItem("token");
        localStorage.removeItem("role");
        window.location.href = "/login";
    }


    async function redirectToMyProfile() {
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = "/login";
            return;
        }
        try {
            const res = await fetch("/api/users/me", {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                }
            });
            if (res.ok) {
                const user = await res.json();
                window.location.href = `/profile/${user.id}`;
            } else {
                window.location.href = "/login";
            }
        } catch (err) {
            console.error("Failed identity check:", err);
            window.location.href = "/login";
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const categoryParam = urlParams.get('category');

        if (categoryParam) {
            console.log(`[ROUTER] Applying filter argument: ${categoryParam}`);
            setTimeout(() => {
                filterCategory(categoryParam.toUpperCase());
            }, 500);
        }
    });
</script>
